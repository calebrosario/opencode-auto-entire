<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#3B82F6" />

  <!-- Brain icon -->
  <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M25 50 Q25 30 40 30 Q55 30 50 50" />
    <path d="M25 50 Q25 70 40 70 Q55 70 50 50" />
    <path d="M30 40 L30 60" />
    <path d="M35 35 L35 65" />
    <path d="M40 30 L40 70" />

    <!-- Right hemisphere -->
    <path d="M75 50 Q75 30 60 30 Q45 30 50 50" />
    <path d="M75 50 Q75 70 60 70 Q45 70 50 50" />
    <path d="M70 40 L70 60" />
    <path d="M65 35 L65 65" />
    <path d="M60 30 L60 70" />

    <!-- Connection lines (memory stack) -->
    <path d="M50 20 L50 30" stroke-width="3" />
    <path d="M50 70 L50 80" stroke-width="3" />
  </g>

  <!-- Checkmark overlay -->
  <circle cx="50" cy="50" r="15" fill="#ffffff" fill-opacity="0.2" />
  <path d="M42 50 L48 56 L58 44" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
